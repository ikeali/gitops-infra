apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: product-postgres
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/PlainMarket/gitops-infra.git
    targetRevision: main
    path: product-postgres/helm
    helm:
      releaseName: product-postgres
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true