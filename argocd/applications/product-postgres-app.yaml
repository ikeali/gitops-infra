apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: product-postgres
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/PlainMarket/product-service.git
    targetRevision: feature/devops
    path: helm/product-postgres

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true