replicaCount: 2

image:
  repository: ghcr.io/plainmarket/cart-service
  tag: "latest"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

containerPort: 8000

tolerations:
  - operator: Exists

env: {}

database:
  host: cart-postgres
  port: "5432"

secrets:
  jwtSecretName: jwt-secret
  cartDbSecretName: cart-db-secret
