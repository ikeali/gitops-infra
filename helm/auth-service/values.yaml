replicaCount: 2

image:
  repository: ghcr.io/plainmarket/auth-service
  tag: "1b8a66fd61f7ae34f33f5b1f1138151f517bfe1b"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8000 

containerPort: 8000

tolerations:
  - operator: Exists

env:
  USER_SERVICE_URL: "http://user-service:8002"

database:
  host: auth-postgres
  port: "5432"

secrets:
  jwtSecretName: jwt-secret
  authDbSecretName: auth-db-secret