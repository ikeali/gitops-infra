replicaCount: 2

image:
  repository: ghcr.io/plainmarket/auth-service
  tag: "0a7313d9c022dc054b0186d11486d99703e2f2f6"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8000 

containerPort: 8000

tolerations:
  - operator: Exists

env:
  USER_SERVICE_URL: "http://user-service:8002"

database:
  host: auth-postgres
  port: "5432"

secrets:
  jwtSecretName: jwt-secret
  authDbSecretName: auth-db-secret