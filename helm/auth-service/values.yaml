replicaCount: 2

image:
  repository: ghcr.io/ikeali/auth-service
  tag: "ef219662123e5fdfe55768bff62e3652d099838c"

  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 8000 

containerPort: 8000

tolerations:
  - operator: Exists

env:
  USER_SERVICE_URL: "http://user-service:8002"

database:
  host: auth-postgres
  port: "5432"

secrets:
  jwtSecretName: jwt-secret
  authDbSecretName: auth-db-secret